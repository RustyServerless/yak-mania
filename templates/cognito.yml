AWSTemplateFormatVersion: 2010-09-09
Description: The Cognito userpool and client for the project

Parameters:
  ProjectName:
    Type: String
  WebsiteDomainName:
    Type: String
    Description: The domain name of our website to deploy

Resources:
  #####################
  # Cognito User Pool #
  #####################
  # Cognito User Pool: a managed user directory that stores admin accounts and issues JWT tokens.
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref ProjectName
      # ESSENTIALS tier unlocks managed login customization (ManagedLoginBranding)
      UserPoolTier: ESSENTIALS
      Schema:
        - Name: email
          Required: true
          # Mutable: false means users cannot change their email after registration
          Mutable: false
      # Users sign in with their email address instead of a separate username
      UsernameAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 2
        SignInPolicy:
          AllowedFirstAuthFactors:
            - PASSWORD
      # Disables self-service password recovery — only admins can reset passwords
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: admin_only
            Priority: 1
      # Disables self-registration — only admins can create new admin users.
      # Players don't use Cognito at all (they use the API key).
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
  # Creates a hosted Cognito domain for the login UI (e.g. yak-mania.auth.<region>.amazoncognito.com)
  DefaultUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Ref ProjectName
      ManagedLoginVersion: 2

  # The OAuth client configuration for the frontend app.
  # Defines how the website authenticates with Cognito.
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Ref ProjectName
      UserPoolId: !Ref UserPool
      # Only Cognito's built-in user directory (no social login, no SAML federation)
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      # Authorization Code flow with PKCE: the most secure OAuth flow for single-page apps
      AllowedOAuthFlows:
        - code
      AuthSessionValidity: 5
      AccessTokenValidity: 8
      IdTokenValidity: 8
      RefreshTokenValidity: 365
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      EnableTokenRevocation: true
      DefaultRedirectURI: !Sub https://${WebsiteDomainName}
      # Both production and development URLs must be explicitly registered.
      # Cognito redirects to one of these after login/logout.
      CallbackURLs:
        - !Sub https://${WebsiteDomainName}
        - !Sub https://${WebsiteDomainName}/
        - http://localhost:3000
        - http://localhost:3000/
      LogoutURLs:
        - !Sub https://${WebsiteDomainName}
        - !Sub https://${WebsiteDomainName}/
        - http://localhost:3000
        - http://localhost:3000/
      # SRP (Secure Remote Password): password never leaves the device.
      # REFRESH_TOKEN_AUTH allows token renewal without re-entering credentials.
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      # No client secret: SPAs can't securely store secrets (code runs in the browser)
      GenerateSecret: false
      # Prevents user enumeration attacks: same error whether a user exists or not
      PreventUserExistenceErrors: ENABLED
  ManagedLogin:
    Type: AWS::Cognito::ManagedLoginBranding
    Properties:
      UserPoolId: !Ref UserPool
      ClientId: !Ref UserPoolClient
      ReturnMergedResources: true
      UseCognitoProvidedValues: true
      # Settings: Json
      # Assets:
      #   - AssetType
  # Users in this group get a `cognito:groups` claim in their JWT token.
  # AppSync uses @aws_cognito_user_pools(cognito_groups: ["Admins"]) for authorization.
  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      UserPoolId: !Ref UserPool
      GroupName: Admins
      Description: Admins can manage everything

Outputs:
  CognitoUserPoolId:
    Description: The Cognito UserPool ID
    Value: !Ref UserPool
  CognitoUserPoolClientId:
    Description: ID of the User Pool Client
    Value: !Ref UserPoolClient
  CognitoDomainName:
    Description: Domain of Cognito
    Value: !Sub ${ProjectName}.auth.${AWS::Region}.amazoncognito.com
