AWSTemplateFormatVersion: 2010-09-09
# Two transforms:
# - LanguageExtensions enables Fn::ForEach (looping over resources) and Fn::ToJsonString
# - Serverless (SAM) enables shorthand like AWS::Serverless::Function
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31
Description: The backend GraphQL API for the website

Parameters:
  ProjectName:
    Type: String
  CognitoUserPoolId:
    Type: String
    Description: The Cognito UserPool ID
  CognitoUserPoolClientId:
    Type: String
    Description: ID of the User Pool Client to authorize

# SAM Globals sets default properties for ALL AWS::Serverless::Function resources in this template.
Globals:
  Function:
    # provided.al2023 is the custom runtime for compiled binaries (Rust, Go, C++).
    # The Lambda service executes the `bootstrap` binary directly.
    Runtime: provided.al2023
    MemorySize: 128
    Timeout: 30
    # For custom runtimes, Handler is technically ignored (bootstrap is always executed).
    # This value is a documentation convention.
    Handler: rust.handler
    Architectures:
      # ARM64 (Graviton2): ~20% cheaper and often faster than x86_64 for Rust Lambda workloads
      - arm64

# CloudFormation Mappings are static lookup tables.
# Here, they list all GraphQL operations organized by type, used to drive the Fn::ForEach loops below.
Mappings:
  AppSyncResolvers:
    Rust:
      Query: [gameState]
      Mutation:
        [
          startGame,
          stopGame,
          resetGame,
          registerNewPlayer,
          updatePlayerName,
          removePlayer,
          buyBabyYak,
          sellGrownYak,
          buyGrownYak,
          sellUnshearedYak,
          buyUnshearedYak,
          sellShearedYak,
        ]
      Subscription: [removedPlayer]
      # Separated because gameUpdated needs a ResponseMappingTemplate for enhanced filtering
      EnhancedSubscription: [gameUpdated]

Resources:
  ############################################
  # Generic (Rust) AppSync GraphQL Resolvers #
  ############################################
  # Fn::ForEach (from AWS::LanguageExtensions) iterates over [Query, Mutation, Subscription]
  # and for each, iterates over operation names from the Mappings to create Resolver resources.
  # This avoids writing dozens of identical resolver definitions by hand.
  "Fn::ForEach::RustOps":
    - OpType
    - [Query, Mutation, Subscription]
    - "Fn::ForEach::Op":
        - Op
        # !FindInMap retrieves the list of operations for the current OpType from the Mappings
        - !FindInMap [AppSyncResolvers, Rust, !Ref OpType]
        # Dynamic logical ID: CF creates unique resource names like "QuerygameStateResolver", etc.
        - "${OpType}${Op}Resolver":
            Type: AWS::AppSync::Resolver
            DependsOn: GraphQLApiSchema
            Properties:
              ApiId: !GetAtt GraphQLApi.ApiId
              DataSourceName: !GetAtt LambdaSource.Name
              Kind: UNIT
              TypeName: !Ref OpType
              FieldName: !Ref Op
              # MaxBatchSize enables batching: AppSync sends up to 100 resolver invocations
              # in a single Lambda call, reducing cold starts and per-invocation overhead.
              MaxBatchSize: 100
              MetricsConfig: ENABLED
  # Separate loop for enhanced subscriptions that need a ResponseMappingTemplate.
  "Fn::ForEach::RustOpsEnhancedSubscription":
    - Op
    - !FindInMap [AppSyncResolvers, Rust, EnhancedSubscription]
    - "Subscription${Op}Resolver":
        Type: AWS::AppSync::Resolver
        DependsOn: GraphQLApiSchema
        Properties:
          ApiId: !GetAtt GraphQLApi.ApiId
          DataSourceName: !GetAtt LambdaSource.Name
          Kind: UNIT
          TypeName: Subscription
          FieldName: !Ref Op
          MaxBatchSize: 100
          MetricsConfig: ENABLED
          # VTL (Velocity Template Language) mapping template for enhanced subscription filtering.
          # $extensions.setSubscriptionFilter() installs a server-side filter so each client only
          # receives updates matching their filter criteria (set by the Lambda resolver).
          ResponseMappingTemplate: |
            #if($context.result.data)
            $extensions.setSubscriptionFilter($context.result.data)
            #end
            null
  #################
  # Backend table #
  #################
  # Single-table design: all entity types (players, yaks, game state) share one table.
  # Different PK/SK patterns discriminate entity types.
  BackendTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-backend
      # PAY_PER_REQUEST: no capacity planning needed, pay per read/write
      BillingMode: PAY_PER_REQUEST
      # Server-side encryption using AWS KMS (encrypts data at rest)
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      # PK (partition key) + SK (sort key) = composite primary key for single-table design
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: _TYPE
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      # GSI on _TYPE enables querying all items of a specific type (e.g. all players)
      # without scanning the entire table
      GlobalSecondaryIndexes:
        - IndexName: iType
          KeySchema:
            - AttributeName: _TYPE
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  #############################################
  # GraphQL API Key + Auto-refresh expiration #
  #############################################
  # AppSync API keys provide unauthenticated access.
  # This key is embedded in the frontend for player (non-admin) operations.
  GraphQLApiPublicKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Description: Public Access Key to the API embedded in the front website
  # API keys expire after 365 days max. This Lambda runs every 7 days to extend the
  # expiration to 30 days from now, preventing silent expiration.
  GraphQLApiPublicKeyRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-refresh-appsync-key
      InlineCode: |
        import boto3, os, json
        from datetime import datetime
        api_id = os.environ['APPSYNC_API_ID']
        key_id = os.environ['APPSYNC_KEY_ID']
        appsync = boto3.client('appsync')
        def lambda_handler(event, context):
          print(json.dumps(event, default=str))
          # Current timestamp as int: int(datetime.now().timestamp())
          # Convert in hours, rounded down to the nearest: // 3600
          # Add 30 days: + 30 * 24
          # Convert it back to seconds
          expires = (int(datetime.now().timestamp()) // 3600 + 30 * 24) * 3600
          print(f"Updating key expiration for API {api_id} and key {key_id}")
          print(f"Will set expiration to {expires}")
          try:
            res = appsync.update_api_key(
              apiId=api_id,
              id=key_id,
              expires=expires
            )
            print(json.dumps(res, default=str))
          except Exception:
            import traceback
            traceback.print_exc()
      Runtime: python3.13
      Handler: index.lambda_handler
      Environment:
        Variables:
          APPSYNC_API_ID: !GetAtt GraphQLApi.ApiId
          APPSYNC_KEY_ID: !GetAtt GraphQLApiPublicKey.ApiKey
      # SAM ScheduleV2 creates an EventBridge Scheduler rule that invokes this Lambda periodically
      Events:
        TriggerEvent:
          Type: ScheduleV2
          Properties:
            Name: !Sub ${ProjectName}-refresh-appsync-key
            ScheduleExpression: "rate(7 days)"
      # SAM shorthand for inline IAM policy.
      # Resource: "*" is needed because appsync:UpdateApiKey doesn't support resource-level restrictions.
      Policies:
        - Version: 2012-10-17
          Statement:
            - Sid: UpdateKey
              Effect: Allow
              Action: appsync:UpdateApiKey
              Resource: "*"
  GraphQLApiPublicKeyRefreshFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GraphQLApiPublicKeyRefreshFunction}
      RetentionInDays: 90
  ###############
  # GraphQL API #
  ###############
  GraphQLApiSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      # Relative file path: `aws cloudformation package` uploads it to S3 at build time
      DefinitionS3Location: ../graphql/schema.gql
  GraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      ApiType: GRAPHQL
      Name: !Ref ProjectName
      Visibility: GLOBAL
      # Primary auth: Cognito User Pools — admin users authenticate with JWT tokens.
      # AppIdClientRegex restricts which Cognito app client IDs are accepted.
      AuthenticationType: AMAZON_COGNITO_USER_POOLS
      UserPoolConfig:
        UserPoolId: !Ref CognitoUserPoolId
        AwsRegion: !Ref AWS::Region
        AppIdClientRegex: !Sub ^${CognitoUserPoolClientId}$
        DefaultAction: ALLOW
      # Second auth mode: API key for unauthenticated player access.
      # In the GraphQL schema, directives (@aws_api_key, @aws_cognito_user_pools)
      # control which auth mode each operation accepts.
      AdditionalAuthenticationProviders:
        - AuthenticationType: API_KEY
      IntrospectionConfig: ENABLED
      QueryDepthLimit: 0 # Unlimited
      ResolverCountLimit: 10000 # 10000
      # Enable X-Ray distributed tracing for the API
      XrayEnabled: true
      LogConfig:
        CloudWatchLogsRoleArn: !GetAtt GraphQLApiLogRole.Arn
        ExcludeVerboseContent: false
        FieldLogLevel: ALL
  # X-Ray sampling rule: controls what percentage of requests are traced.
  # FixedRate: 1 (100%) + ReservoirSize: 200 = trace everything.
  GraphQLApiXraySamplingRule:
    Type: AWS::XRay::SamplingRule
    Properties:
      SamplingRule:
        RuleName: !Sub ${ProjectName}-appsync
        Version: 1
        ResourceARN: !GetAtt GraphQLApi.Arn
        ServiceName: "*"
        ServiceType: AWS::AppSync::GraphQLAPI
        Priority: 10
        ReservoirSize: 200
        FixedRate: 1
        HTTPMethod: POST # The only value for AppSync
        Host: "*"
        URLPath: "*"
  GraphQLApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/appsync/apis/${GraphQLApi.ApiId}
      RetentionInDays: 14
  GraphQLApiLogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-gql-log
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Path: /
  GraphQLApiLogRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      Roles:
        - !Ref GraphQLApiLogRole
      PolicyName: cloudwatch
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt GraphQLApiLogGroup.Arn
  ################
  # Data Sources #
  ################
  # The main Rust Lambda: handles ALL AppSync resolvers via the lambda-appsync crate.
  # CodeUri points to the compiled binary directory.
  AppsyncSourceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-appsync-source
      CodeUri: ../rust/lambdas/appsync-source
      # Active tracing: the Lambda service creates X-Ray segments automatically
      Tracing: Active
      Environment:
        Variables:
          # Table name injected at runtime so the Lambda code doesn't hardcode it
          BACKEND_TABLE_NAME: !Ref BackendTable
          # RUST_LOG configures the `tracing` crate's log filter:
          # debug for app code, info for noisy AWS SDK internals
          RUST_LOG: debug,hyper=info,h2=info,tracing=info,aws_config=info,aws_smithy_runtime=info,aws_smithy_runtime_api=info,rustls=info
          # XRAY_ANNOTATIONS: awssdk-instrumentation promotes these tracing span fields
          # to X-Ray annotations, making them searchable in the X-Ray console
          XRAY_ANNOTATIONS: operation player_id player_name yak_id job
      Policies:
        - Version: 2012-10-17
          Statement:
            - Sid: FullDataAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:BatchGetItem
                - dynamodb:BatchWriteItem
                - dynamodb:ConditionCheckItem
              Resource:
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BackendTable}
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BackendTable}/index/*
  AppsyncSourceFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AppsyncSourceFunction}
      RetentionInDays: 90
  # Connects AppSync to the Lambda function.
  # Type: AWS_LAMBDA tells AppSync this data source invokes a Lambda.
  # ServiceRoleArn is the IAM role AppSync assumes to invoke the Lambda.
  LambdaSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Type: AWS_LAMBDA
      Name: lambda_source
      LambdaConfig:
        LambdaFunctionArn: !GetAtt AppsyncSourceFunction.Arn
      ServiceRoleArn: !GetAtt LambdaDatasourceRole.Arn
  LambdaDatasourceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-gql-lambda
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: dynamodb
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt AppsyncSourceFunction.Arn
      Path: /

Outputs:
  ApiUrl:
    Description: The URL of the API
    Value: !Sub https://${GraphQLApi.GraphQLDns}/graphql
  ApiKey:
    Description: The Public API key of the API
    Value: !GetAtt GraphQLApiPublicKey.ApiKey
