AWSTemplateFormatVersion: 2010-09-09
Transform:
  - AWS::LanguageExtensions
  - AWS::Serverless-2016-10-31
Description: Tracing demo - comparing X-Ray instrumentation approaches across Python and Rust Lambdas

Parameters:
  ProjectName:
    Type: String

# Default properties for all Lambdas in this template.
# Tracing: Active enables X-Ray for all functions.
Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Architectures:
      - arm64
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: !Ref DemoTable

# Region-to-layer-ARN mapping for the new ADOT (AWS Distro for OpenTelemetry) v2 Lambda layer.
# Each region has its own published layer ARN since Lambda layers are region-specific.
Mappings:
  AdotNewLayer:
    af-south-1:
      Arn: arn:aws:lambda:af-south-1:904233096616:layer:AWSOpenTelemetryDistroPython:18
    ap-east-1:
      Arn: arn:aws:lambda:ap-east-1:888577020596:layer:AWSOpenTelemetryDistroPython:18
    ap-northeast-1:
      Arn: arn:aws:lambda:ap-northeast-1:615299751070:layer:AWSOpenTelemetryDistroPython:21
    ap-northeast-2:
      Arn: arn:aws:lambda:ap-northeast-2:615299751070:layer:AWSOpenTelemetryDistroPython:21
    ap-northeast-3:
      Arn: arn:aws:lambda:ap-northeast-3:615299751070:layer:AWSOpenTelemetryDistroPython:20
    ap-south-1:
      Arn: arn:aws:lambda:ap-south-1:615299751070:layer:AWSOpenTelemetryDistroPython:21
    ap-south-2:
      Arn: arn:aws:lambda:ap-south-2:796973505492:layer:AWSOpenTelemetryDistroPython:18
    ap-southeast-1:
      Arn: arn:aws:lambda:ap-southeast-1:615299751070:layer:AWSOpenTelemetryDistroPython:20
