      Arn: arn:aws:lambda:ap-southeast-2:615299751070:layer:AWSOpenTelemetryDistroPython:21
    ap-southeast-3:
      Arn: arn:aws:lambda:ap-southeast-3:039612877180:layer:AWSOpenTelemetryDistroPython:18
    ap-southeast-4:
      Arn: arn:aws:lambda:ap-southeast-4:713881805771:layer:AWSOpenTelemetryDistroPython:18
    ap-southeast-5:
      Arn: arn:aws:lambda:ap-southeast-5:152034782359:layer:AWSOpenTelemetryDistroPython:9
    ap-southeast-7:
      Arn: arn:aws:lambda:ap-southeast-7:980416031188:layer:AWSOpenTelemetryDistroPython:9
    ca-central-1:
      Arn: arn:aws:lambda:ca-central-1:615299751070:layer:AWSOpenTelemetryDistroPython:21
    ca-west-1:
      Arn: arn:aws:lambda:ca-west-1:595944127152:layer:AWSOpenTelemetryDistroPython:9
    eu-central-1:
      Arn: arn:aws:lambda:eu-central-1:615299751070:layer:AWSOpenTelemetryDistroPython:21
